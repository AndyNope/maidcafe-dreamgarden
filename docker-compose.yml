version: '3.9'

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-maidcafe}
      MYSQL_USER: ${DB_USER:-maidcafe}
      MYSQL_PASSWORD: ${DB_PASSWORD:-maidcafe_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-maidcafe}
      DB_USER: ${DB_USER:-maidcafe}
      DB_PASSWORD: ${DB_PASSWORD:-maidcafe_secret}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      APP_ENV: development
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./backend:/var/www/html
      - ./uploads:/var/www/html/public/uploads
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "mkdir -p /var/www/html/public/uploads
               && chown -R www-data:www-data /var/www/html/public/uploads
               && chmod 775 /var/www/html/public/uploads
               && apache2-foreground"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - api

volumes:
  db_data:
